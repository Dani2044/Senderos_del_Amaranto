@if (!selected) {
  <div class="mt-3 mb-2">
    <input
      type="search"
      class="form-control input-soft"
      placeholder="Buscar reservas…"
      [value]="search"
      (input)="onSearch($any($event.target).value)"
      />
    </div>
  }
  @if (!selected) {
    <div class="reservations-grid-wrap">
      @if (loading) {
        <div class="text-center p-4">
          <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Cargando...</span>
          </div>
          <p class="mt-2">Cargando reservas...</p>
        </div>
      }
      @if (isBrowser && !loading) {
        <ag-grid-angular
          [theme]="gridTheme"
          [gridOptions]="gridOptions"
          [rowData]="rowData"
          [pagination]="true"
          [ngClass]="{ 'compact-grid': compactLayout }"
          style="width: 100%; height: 400px"
          >
          @if (!loading && rowData.length === 0) {
            <div class="text-center p-4">
              <p class="text-muted">No hay reservas disponibles.</p>
            </div>
          }
        </ag-grid-angular>
      }
    </div>
  }

  <!-- reserve detail -->
  <app-reservation-detail-op
    [reservation]="selected"
    (editingChanged)="detailEditing = $event"
    (closeRequested)="onCloseDetail()"
    >
  </app-reservation-detail-op>
