@if (!selected) {
  <div class="container mt-4">
    <h1 class="text-center">Agregar servicios a una Reserva</h1>
    <form (ngSubmit)="search()" class="input-group searchbar mb-3">
      <input
        [(ngModel)]="roomNumber"
        class="form-control"
        placeholder="Ingrese el número de habitación"
        name="roomNumber"
        />
        <button type="submit" class="btn btn-primary">Buscar</button>
      </form>
      @if (errorMessage) {
        <div class="alert alert-danger">{{ errorMessage }}</div>
      }
      <app-search-result-table
        [reservations]="reservations"
        (openDetail)="onOpenDetail($event)"
        (activateReservation)="activateReservation($event)"
        (deactivateReservation)="deactivateReservation($event)"
      ></app-search-result-table>
    </div>
  }

  <!-- Detail view -->
  @if (selected) {
    <app-reservation-detail-op
      [reservation]="selected"
      (closeRequested)="onCloseDetail()"
    ></app-reservation-detail-op>
  }
