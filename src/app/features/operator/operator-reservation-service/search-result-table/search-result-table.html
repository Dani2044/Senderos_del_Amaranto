<div class="reservations-grid-wrap">
  @if (isBrowser) {
    <ag-grid-angular
      [theme]="gridTheme"
      [gridOptions]="gridOptions"
      [rowData]="rowData"
      [pagination]="true"
      style="width: 100%; height: 400px"
      >
      @if (rowData.length === 0) {
        <div class="text-center p-4">
          <p class="text-muted">No hay resultados.</p>
        </div>
      }
    </ag-grid-angular>
  }
</div>
