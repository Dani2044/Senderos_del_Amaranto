<section class="parallax hoteles">
  <div class="carousel">
    <!-- Card 1: La Historia -->
    <div class="card-car active" data-bg="foto-historia-huerta.jpg">
      <div class="card-place">
        <div class="card-text">
          <h1>Nuestra Historia</h1>
          <p>Desde 1999 transformando escombros en esperanza en Ciudad Bolívar.</p>
          <button class="btn-explore" [routerLink]="['/nosotros']">Leer más →</button>
        </div>
        <div class="card-image">
          <div class="img-card">
            <img src="recuperacion-suelo.jpg" alt="Recuperación">
            <span class="title">Recuperación</span>
          </div>
          <div class="img-card">
            <img src="trabajo-comunitario.jpg" alt="Comunidad">
            <span class="title">Comunidad</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Card 2: Productos (Amaranto y más) -->
    <div class="card-car" data-bg="foto-amaranto.jpg">
      <div class="card-place">
        <div class="card-text">
          <h1>Nuestra Cosecha</h1>
          <p>Amaranto, quinoa y vegetales limpios cultivados con amor.</p>
          <button class="btn-explore" [routerLink]="['/programas']">Ver productos →</button>
        </div>
        <div class="card-image">
          <div class="img-card">
            <img src="amaranto-grano.jpg" alt="Amaranto">
            <span class="title">Amaranto</span>
          </div>
          <div class="img-card">
            <img src="quinoa-siembra.jpg" alt="Quinoa">
            <span class="title">Quinoa</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
