@if (isBrowser && !editing && !selected) {
  <details #createDetails (toggle)="onCreateToggle($event)">
    <summary>Crear servicio</summary>
    @if (showCreate) {
      <app-services-form
        [draft]="createDraft"
        [hotels]="hotelOptions"
        [loading]="createLoading"
        (cancel)="cancelCreate()"
        (save)="saveCreate($event)"
      ></app-services-form>
    }
  </details>
  <div class="mt-3 mb-2">
    <input
      type="search"
      class="form-control input-soft"
      placeholder="Buscar servicios…"
      [value]="search"
      (input)="onSearch($any($event.target).value)"
      />
    </div>
    <div class="services-grid-wrap">
      <ag-grid-angular
        [theme]="gridTheme"
        [gridOptions]="gridOptions"
        [rowData]="rowData"
        [pagination]="true"
        style="width: 100%; height: 100%"
        >
      </ag-grid-angular>
    </div>
  }

  <!-- Detail Form -->
  @if (selected && !editing) {
    <app-services-detail
      [service]="selected"
      (editRequested)="onDetailEdit($event)"
    ></app-services-detail>
  }

  @if (editing) {
    <app-services-form
      [draft]="draft"
      [hotels]="hotelOptions"
      [loading]="loading"
      (cancel)="cancelEdit()"
      (save)="saveEdit($event)"
    ></app-services-form>
  }
